<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>รีเซ็ตรหัสแอดมิน</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Kanit',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
h1{font-size:18px;font-weight:900;color:#f0883e;margin-bottom:4px;}
.sub{font-size:12px;color:#8b949e;margin-bottom:20px;line-height:1.5;}
label{display:block;font-size:13px;font-weight:700;color:#c9d1d9;margin-bottom:6px;}
input{width:100%;padding:12px 14px;background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-family:'Kanit',sans-serif;font-size:15px;outline:none;margin-bottom:14px;transition:border-color .15s;}
input:focus{border-color:#f0883e;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#f0883e,#c05020);border:none;border-radius:11px;color:#fff;font-family:'Kanit',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(120,40,0,.5);transition:opacity .15s,transform .1s;}
.btn:active{transform:translateY(2px);opacity:.88;}
.btn:disabled{opacity:.5;cursor:default;transform:none;}
.btn2{background:rgba(30,100,200,.3);border:1px solid rgba(30,100,200,.4);box-shadow:none;font-size:13px;padding:10px;margin-top:0;}
.msg{border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;text-align:center;margin-top:12px;display:none;line-height:1.5;}
.msg.ok{display:block;background:rgba(30,180,80,.15);border:1px solid rgba(30,180,80,.3);color:#40e880;}
.msg.err{display:block;background:rgba(220,50,50,.15);border:1px solid rgba(220,50,50,.3);color:#ff8080;}
.warn{background:rgba(240,136,62,.1);border:1px solid rgba(240,136,62,.25);border-radius:10px;padding:10px 13px;font-size:12px;color:#f0883e;margin-bottom:20px;line-height:1.5;}
hr{border:none;border-top:1px solid #21262d;margin:20px 0;}
.hash-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:8px 11px;font-size:10px;color:#8b949e;word-break:break-all;margin-top:8px;display:none;line-height:1.5;}
#status{font-size:12px;color:#8b949e;text-align:center;margin-bottom:16px;}
#status.ok{color:#40e880;}
#status.err{color:#ff8080;}
</style>
</head>
<body>
<div class="card">
  <h1>🔑 รีเซ็ตรหัสแอดมิน</h1>
  <div class="sub">ใช้หน้านี้เพื่อตั้งรหัสแอดมินใหม่<br>⚠️ ลบไฟล์นี้ออกทันทีหลังใช้งาน</div>
  <div class="warn">⚠️ หน้านี้ไม่มีการยืนยันตัวตน — <b>ลบออกจาก GitHub</b> ทันทีที่รีเซ็ตเสร็จ</div>
  <div id="status">⏳ กำลังเชื่อมต่อ Firebase...</div>
  <div style="margin-bottom:10px"><label>รหัสผ่านแอดมินใหม่</label><input type="password" id="p1" placeholder="ใส่รหัสใหม่" maxlength="50"></div>
  <div style="margin-bottom:4px"><label>ยืนยันรหัสผ่าน</label><input type="password" id="p2" placeholder="พิมพ์ซ้ำ" maxlength="50"></div>
  <button class="btn" id="btn" onclick="doReset()" disabled>🔑 บันทึกรหัสใหม่</button>
  <div class="msg" id="msg"></div>
  <hr>
  <button class="btn btn2" onclick="checkCurrent()">🔍 ดู Hash ปัจจุบันใน Firestore</button>
  <div class="hash-box" id="hash-box"></div>
</div>

<script>
// Firebase โหลดแบบ dynamic เพื่อกัน race condition
let db = null;

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=res;
    s.onerror=()=>rej(new Error('โหลดไม่ได้: '+src));
    document.head.appendChild(s);
  });
}

async function initFirebase(){
  const stat=document.getElementById('status');
  const btn=document.getElementById('btn');
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');
    if(!firebase.apps.length){
      firebase.initializeApp({
        apiKey:"AIzaSyDUd1A3TyFBSSPGihdULbmnfTV6kvrOByY",
        authDomain:"poker-kan.firebaseapp.com",
        projectId:"poker-kan",
        storageBucket:"poker-kan.firebasestorage.app",
        messagingSenderId:"267226971967",
        appId:"1:267226971967:web:3ae1891c63194a97715d8a"
      });
    }
    db=firebase.firestore();
    stat.textContent='✅ เชื่อมต่อ Firebase สำเร็จ';
    stat.className='ok';
    btn.disabled=false;
  }catch(e){
    stat.textContent='❌ Firebase โหลดไม่ได้: '+(e.message||e)+'\nลองรีโหลดหน้าครับ';
    stat.className='err';
    stat.style.whiteSpace='pre-wrap';
  }
}

async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

function showMsg(type,text){const e=document.getElementById('msg');e.className='msg '+type;e.textContent=text;}

async function doReset(){
  if(!db){showMsg('err','Firebase ยังไม่พร้อม กรุณารอสักครู่แล้วลองใหม่');return;}
  const p1=document.getElementById('p1').value;
  const p2=document.getElementById('p2').value;
  if(!p1||p1.length<4){showMsg('err','รหัสผ่านต้องมีอย่างน้อย 4 ตัว');return;}
  if(p1!==p2){showMsg('err','รหัสผ่านไม่ตรงกัน');return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='⏳ กำลังบันทึก...';
  try{
    const hash=await sha256(p1);
    await db.collection('admin').doc('config').set({passwordHash:hash,updatedAt:Date.now()},{merge:true});
    showMsg('ok','✅ รีเซ็ตสำเร็จแล้วครับ!\nไปเข้า admin.html ได้เลย\n\n⚠️ อย่าลืมลบไฟล์นี้ออกด้วยนะครับ');
    document.getElementById('p1').value='';document.getElementById('p2').value='';
  }catch(e){showMsg('err','ไม่สำเร็จ: '+(e.message||e));}
  finally{btn.disabled=false;btn.textContent='🔑 บันทึกรหัสใหม่';}
}

async function checkCurrent(){
  if(!db){document.getElementById('hash-box').style.display='block';document.getElementById('hash-box').textContent='Firebase ยังไม่พร้อม';return;}
  const box=document.getElementById('hash-box');
  box.style.display='block';box.textContent='กำลังโหลด...';
  try{
    const snap=await db.collection('admin').doc('config').get();
    if(!snap.exists){box.textContent='ยังไม่มีรหัสแอดมินใน Firestore\n(admin/config doc ไม่มี)';}
    else{
      const d=snap.data();
      box.textContent='Hash: '+d.passwordHash+'\nอัปเดต: '+(d.updatedAt?new Date(d.updatedAt).toLocaleString('th'):'ไม่ทราบ');
    }
  }catch(e){box.textContent='ดึงข้อมูลไม่ได้: '+(e.message||e);}
}

// เริ่ม init ทันทีที่หน้าโหลด
initFirebase();
</script>
</body>
</html>
