<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>รีเซ็ต/ตรวจสอบ รหัสแอดมิน</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Kanit',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:24px 20px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
h1{font-size:17px;font-weight:900;color:#f0883e;margin-bottom:14px;}
.sec{background:#0d1117;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:14px;}
.sec-t{font-size:13px;font-weight:900;color:#c9d1d9;margin-bottom:10px;}
label{display:block;font-size:12px;font-weight:700;color:#8b949e;margin-bottom:5px;}
input{width:100%;padding:11px 13px;background:#010409;border:1px solid #30363d;border-radius:9px;color:#e6edf3;font-family:'Kanit',sans-serif;font-size:15px;outline:none;margin-bottom:11px;}
input:focus{border-color:#f0883e;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#f0883e,#c05020);border:none;border-radius:10px;color:#fff;font-family:'Kanit',sans-serif;font-size:14px;font-weight:900;cursor:pointer;}
.btn:active{opacity:.85;}
.btn:disabled{opacity:.5;}
.btn-blue{background:rgba(30,100,200,.35);border:1px solid rgba(60,130,230,.4);}
.btn-green{background:linear-gradient(135deg,#2ea043,#1a7431);}
.out{font-size:11px;color:#8b949e;word-break:break-all;margin-top:9px;line-height:1.6;white-space:pre-wrap;}
.out.ok{color:#3fb950;}
.out.err{color:#f85149;}
.out.warn{color:#d29922;}
#status{font-size:12px;text-align:center;margin-bottom:14px;color:#8b949e;}
#status.ok{color:#3fb950;}#status.err{color:#f85149;}
.warn-box{background:rgba(240,136,62,.1);border:1px solid rgba(240,136,62,.25);border-radius:9px;padding:9px 12px;font-size:11px;color:#f0883e;margin-bottom:16px;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <h1>🔧 รีเซ็ต / ตรวจสอบ รหัสแอดมิน</h1>
  <div class="warn-box">⚠️ ใช้แล้ว <b>ลบไฟล์นี้ออกจาก GitHub</b> ทันที</div>
  <div id="status">⏳ กำลังเชื่อมต่อ Firebase...</div>

  <!-- ส่วนที่ 1: ดูสถานะ -->
  <div class="sec">
    <div class="sec-t">1️⃣ ดูสถานะที่บันทึกอยู่</div>
    <button class="btn btn-blue" onclick="checkAll()" disabled id="b-check">🔍 ตรวจสอบ Firestore</button>
    <div class="out" id="out-check"></div>
  </div>

  <!-- ส่วนที่ 2: ตั้งรหัสใหม่ -->
  <div class="sec">
    <div class="sec-t">2️⃣ ตั้งรหัสใหม่ (เขียนทั้ง 2 ที่ + ตรวจซ้ำ)</div>
    <label>รหัสใหม่</label>
    <input type="text" id="p1" placeholder="พิมพ์รหัส (เห็นตัวอักษรได้)" maxlength="50" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button class="btn btn-green" onclick="doReset()" disabled id="b-reset">💾 บันทึก + ตรวจซ้ำ</button>
    <div class="out" id="out-reset"></div>
  </div>

  <!-- ส่วนที่ 3: ทดสอบรหัส -->
  <div class="sec">
    <div class="sec-t">3️⃣ ทดสอบรหัส (เช็คว่าตรงกับที่บันทึกไหม)</div>
    <label>พิมพ์รหัสที่จะใช้เข้า admin</label>
    <input type="text" id="ptest" placeholder="พิมพ์รหัสที่จะลอง" maxlength="50" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button class="btn" onclick="testPass()" disabled id="b-test">✅ ทดสอบ</button>
    <div class="out" id="out-test"></div>
  </div>
</div>

<script>
let db=null;
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('โหลดไม่ได้: '+src));document.head.appendChild(s);});}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function set(id,cls,txt){const e=document.getElementById(id);e.className='out '+(cls||'');e.textContent=txt;}

async function initFb(){
  const st=document.getElementById('status');
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');
    if(!firebase.apps.length)firebase.initializeApp({apiKey:"AIzaSyDUd1A3TyFBSSPGihdULbmnfTV6kvrOByY",authDomain:"poker-kan.firebaseapp.com",projectId:"poker-kan",storageBucket:"poker-kan.firebasestorage.app",messagingSenderId:"267226971967",appId:"1:267226971967:web:3ae1891c63194a97715d8a"});
    db=firebase.firestore();
    st.textContent='✅ เชื่อมต่อสำเร็จ';st.className='ok';
    ['b-check','b-reset','b-test'].forEach(id=>document.getElementById(id).disabled=false);
    checkAll();
  }catch(e){st.textContent='❌ Firebase โหลดไม่ได้: '+(e.message||e);st.className='err';}
}

async function readDoc(coll,docId){
  try{const s=await db.collection(coll).doc(docId).get();return s.exists?s.data():null;}
  catch(e){return {__err:e.message||String(e)};}
}

async function checkAll(){
  set('out-check','warn','กำลังตรวจ...');
  const a=await readDoc('admin','config');
  const c=await readDoc('config','admin');
  let txt='';
  txt+='📁 admin/config: ';
  if(a&&a.__err)txt+='อ่านไม่ได้ ('+a.__err+')\n';
  else if(!a)txt+='ไม่มี doc\n';
  else txt+='มีรหัส ✓ (hash: '+(a.passwordHash||'').slice(0,12)+'...)\n';
  txt+='📁 config/admin: ';
  if(c&&c.__err)txt+='อ่านไม่ได้ ('+c.__err+')\n';
  else if(!c)txt+='ไม่มี doc';
  else txt+='มีรหัส ✓ (hash: '+(c.passwordHash||'').slice(0,12)+'...)';
  const hasAny=(a&&!a.__err&&a.passwordHash)||(c&&!c.__err&&c.passwordHash);
  set('out-check',hasAny?'ok':'warn',txt+(hasAny?'':'\n\n⚠️ ยังไม่มีรหัสที่ไหนเลย — ไปตั้งใหม่ที่ข้อ 2'));
}

async function doReset(){
  if(!db){set('out-reset','err','Firebase ยังไม่พร้อม');return;}
  const p1=document.getElementById('p1').value;
  if(!p1||p1.length<4){set('out-reset','err','รหัสต้องมีอย่างน้อย 4 ตัว');return;}
  const btn=document.getElementById('b-reset');btn.disabled=true;btn.textContent='⏳...';
  try{
    const hash=await sha256(p1);
    const data={passwordHash:hash,updatedAt:Date.now()};
    let w1='',w2='';
    try{await db.collection('admin').doc('config').set(data,{merge:true});w1='✓';}catch(e){w1='✗ '+(e.message||e);}
    try{await db.collection('config').doc('admin').set(data,{merge:true});w2='✓';}catch(e){w2='✗ '+(e.message||e);}
    // อ่านกลับมาตรวจ
    const back=await readDoc('admin','config');
    const verified=back&&!back.__err&&back.passwordHash===hash;
    set('out-reset',verified?'ok':'warn',
      'เขียน admin/config: '+w1+'\nเขียน config/admin: '+w2+'\n'+
      (verified?'✅ ตรวจซ้ำผ่าน! รหัสบันทึกถูกต้องแล้ว\n→ ไปเข้า admin.html ด้วยรหัสนี้ได้เลย':'⚠️ อ่านกลับไม่ตรง อาจติด Security Rules'));
  }catch(e){set('out-reset','err','ผิดพลาด: '+(e.message||e));}
  finally{btn.disabled=false;btn.textContent='💾 บันทึก + ตรวจซ้ำ';}
}

async function testPass(){
  if(!db){set('out-test','err','Firebase ยังไม่พร้อม');return;}
  const p=document.getElementById('ptest').value;
  if(!p){set('out-test','err','พิมพ์รหัสก่อน');return;}
  set('out-test','warn','กำลังเช็ค...');
  const hash=await sha256(p);
  const a=await readDoc('admin','config');
  const c=await readDoc('config','admin');
  const okA=a&&!a.__err&&a.passwordHash===hash;
  const okC=c&&!c.__err&&c.passwordHash===hash;
  if(okA||okC)set('out-test','ok','✅ รหัสนี้ถูกต้อง! ('+(okA?'admin/config':'config/admin')+')\nใช้รหัสนี้เข้า admin.html ได้เลยครับ');
  else set('out-test','err','❌ รหัสนี้ไม่ตรงกับที่บันทึกไว้\nลองตั้งใหม่ที่ข้อ 2 แล้วใช้รหัสเดียวกันเป๊ะ');
}

initFb();
</script>
</body>
</html>
