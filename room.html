<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3 กอง กาญ — ห้องเกม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&display=swap" rel="stylesheet">
<!-- Firebase compat SDK (ใช้งานได้บน GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#faf8f5;--text:#1a0e00;--muted:#7a4a18;--gold:#b85e00;--green:#0e6030;--red:#921010;--border:rgba(150,80,0,.15);}
html,body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;padding:20px;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
/* JOIN */
#join{justify-content:center;gap:16px;max-width:360px;margin:0 auto;width:100%;}
.logo{text-align:center;margin-bottom:8px;}
.logo-title{font-size:34px;font-weight:900;color:var(--gold);}
.logo-sub{font-size:12px;color:var(--muted);}
.card-box{background:#fff;border-radius:16px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.06);width:100%;}
.card-box h2{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Kanit',sans-serif;font-size:15px;color:var(--text);background:#fff;outline:none;}
.field input:focus{border-color:var(--gold);}
.code-input{font-size:22px!important;font-weight:900!important;letter-spacing:4px!important;text-align:center!important;text-transform:uppercase!important;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Kanit',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(160deg,#e08000,#b05800);color:#fff;box-shadow:0 4px 0 #7a3800;}
.btn-green{background:linear-gradient(160deg,#20b060,#0e6030);color:#fff;box-shadow:0 4px 0 #084020;}
.btn-gray{background:#f0ebe3;color:#5a3818;border:1px solid var(--border);}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;}
.btn-red{background:linear-gradient(160deg,#e84040,#b02020);color:#fff;}
.err{color:var(--red);font-size:13px;font-weight:600;text-align:center;margin-top:-4px;min-height:20px;}
/* LOBBY */
#lobby{justify-content:flex-start;gap:12px;max-width:440px;margin:0 auto;width:100%;padding-top:24px;}
.room-code-label{font-size:11px;color:var(--muted);text-align:center;font-weight:700;letter-spacing:.5px;}
.room-code-badge{display:inline-block;background:#fff3e0;border:2px solid var(--gold);border-radius:12px;padding:8px 24px;font-size:28px;font-weight:900;letter-spacing:4px;color:var(--gold);text-align:center;}
.status-bar{width:100%;background:#fff3e0;border-radius:12px;padding:10px 14px;border:1px solid rgba(150,80,0,.2);font-size:13px;font-weight:700;color:#6a2e00;text-align:center;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.players-grid{width:100%;background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.players-header{background:#fff3e0;padding:10px 14px;font-size:12px;font-weight:800;color:var(--gold);display:flex;justify-content:space-between;}
.player-item{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(150,80,0,.08);}
.player-item:last-child{border-bottom:none;}
.player-avatar{font-size:22px;}
.player-name{font-size:15px;font-weight:700;flex:1;}
.player-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
.s-host{background:#e8f0ff;color:#1460a0;}
.s-ready{background:#e0f5ea;color:#0e6030;}
.s-wait{background:#fff3e0;color:#8a4800;}
.lobby-actions{width:100%;display:flex;flex-direction:column;gap:8px;}
.lob-info{text-align:center;font-size:13px;color:var(--muted);padding:4px;}
/* WAITING */
#waiting{justify-content:center;gap:16px;text-align:center;max-width:360px;margin:0 auto;width:100%;}
.wait-title{font-size:22px;font-weight:900;color:var(--gold);}
.wait-sub{font-size:14px;color:var(--muted);}
.pwait-grid{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;width:100%;}
.pwait-item{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(150,80,0,.08);}
.pwait-item:last-child{border-bottom:none;}
/* RESULT */
#res-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px;}
#res-overlay.show{display:flex;}
.res-card{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto;}
.res-title{font-size:22px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:14px;}
.score-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:6px;background:#faf8f5;border:1px solid var(--border);}
.score-name{flex:1;font-size:15px;font-weight:700;}
.score-pts{font-size:18px;font-weight:900;}
.pos{color:var(--green);}.neg{color:var(--red);}
</style>
</head>
<body>

<!-- JOIN -->
<div id="join" class="screen active">
  <div class="logo">
    <div class="logo-title">🃏 3 กอง กาญ</div>
    <div class="logo-sub">ระบบห้องเกม Real-time</div>
  </div>
  <div class="card-box" id="join-box">
    <h2>🚪 เข้าร่วมห้อง</h2>
    <!-- แสดงเฉพาะเมื่อไม่มี room+name จาก URL -->
    <div id="manual-fields">
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="inp-code" class="code-input" placeholder="KAN-123" maxlength="10" autocomplete="off"
          oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field">
        <label>ชื่อของคุณ</label>
        <input type="text" id="inp-name" placeholder="เช่น สมชาย" maxlength="12" autocomplete="off">
      </div>
    </div>
    <!-- แสดงเมื่อมาจาก login → auto-join -->
    <div id="auto-join-box" style="display:none;text-align:center;padding:12px 0;">
      <div id="auto-av" style="font-size:48px;margin-bottom:8px">🦊</div>
      <div id="auto-name" style="font-size:18px;font-weight:800;color:#1a0e00;margin-bottom:4px">—</div>
      <div style="font-size:13px;color:#b87840;margin-bottom:16px">กำลังเข้าห้อง...</div>
      <div style="display:flex;gap:6px;justify-content:center">
        <div style="width:8px;height:8px;border-radius:50%;background:#b85e00;animation:pulse 1.4s infinite"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#b85e00;animation:pulse 1.4s .2s infinite"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#b85e00;animation:pulse 1.4s .4s infinite"></div>
      </div>
    </div>
    <div id="join-err" class="err"></div>
    <button class="btn btn-gold" id="join-btn" onclick="joinRoom()">▶ เข้าห้อง</button>
  </div>
  <div id="join-footer" style="text-align:center;font-size:12px;color:var(--muted);margin-top:4px">
    Admin เป็นคนสร้างห้องและส่ง Room Code ให้ครับ
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div style="text-align:center;width:100%">
    <div class="room-code-label">ROOM CODE</div>
    <div class="room-code-badge" id="lob-code">—</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">แชร์โค้ดนี้ให้เพื่อนครับ</div>
  </div>
  <div class="status-bar"><span class="dot"></span><span id="lob-status">รอผู้เล่นเข้าร่วม...</span></div>
  <div class="players-grid">
    <div class="players-header">
      <span>👥 ผู้เล่นในห้อง</span>
      <span id="lob-count">0</span>
    </div>
    <div id="lob-players"></div>
  </div>
  <div class="lobby-actions">
    <button class="btn btn-green" id="btn-start" onclick="startGame()" style="display:none">🎮 เริ่มเกม!</button>
    <div class="lob-info" id="lob-info">รอ Host กด "เริ่มเกม"</div>
    <button class="btn btn-gray" onclick="leaveRoom()">← ออกจากห้อง</button>
  </div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <div class="wait-title">✅ ยืนยันแล้ว</div>
  <div class="wait-sub">รอผู้เล่นอื่นจัดไพ่...</div>
  <div class="pwait-grid" id="wait-players"></div>
  <button class="btn btn-gray" style="max-width:280px;width:100%;margin-top:8px" onclick="undoConfirm()">↩ จัดใหม่</button>
</div>

<!-- RESULT OVERLAY -->
<div id="res-overlay">
  <div class="res-card">
    <div class="res-title">🏆 ผลรอบนี้</div>
    <div id="res-scores"></div>
    <br>
    <button class="btn btn-gold" onclick="nextRound()">▶ รอบต่อไป</button>
    <br><br>
    <button class="btn btn-gray" onclick="leaveRoom()">🏠 ออกจากห้อง</button>
  </div>
</div>

<script>
// ── Firebase init ──
const FC={
  apiKey:"AIzaSyDUd1A3TyFBSSPGihdULbmnfTV6kvrOByY",
  authDomain:"poker-kan.firebaseapp.com",
  projectId:"poker-kan",
  storageBucket:"poker-kan.firebasestorage.app",
  messagingSenderId:"267226971967",
  appId:"1:267226971967:web:3ae1891c63194a97715d8a"
};
firebase.initializeApp(FC);
const db=firebase.firestore();

const AVATARS=['🦊','🐯','🐻','🐼','🐶','🐱','🐸','🦁','🐺','🦄'];
let myId=null,myName=null,roomId=null,isHost=false,unsub=null;

function uid(){return Math.random().toString(36).slice(2,7).toUpperCase();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showErr(m){document.getElementById('join-err').textContent=m;}

// ── JOIN ──
async function joinRoom(){
  const code=document.getElementById('inp-code').value.trim().toUpperCase().replace(/\s/g,'');
  const name=document.getElementById('inp-name').value.trim();
  if(!code){showErr('กรุณากรอก Room Code');return;}
  if(!name){showErr('กรุณากรอกชื่อ');return;}
  showErr('กำลังเชื่อมต่อ...');
  try{
    const ref=db.collection('rooms').doc(code);
    const snap=await ref.get();
    if(!snap.exists){showErr('ไม่พบห้องนี้ กรุณาตรวจ Room Code');return;}
    const data=snap.data();
    if(data.status==='playing'){showErr('ห้องนี้กำลังเล่นอยู่แล้ว');return;}
    const players=data.players||{};
    const pKeys=Object.keys(players);
    if(pKeys.length>=6){showErr('ห้องเต็มแล้ว (สูงสุด 6 คน)');return;}
    myId=uid(); myName=name; roomId=code;
    isHost=pKeys.length===0;
    const av=AVATARS[pKeys.length%AVATARS.length];
    const updates={};
    updates[`players.${myId}`]={name,avatar:av,ready:false,isHost,score:0,joinedAt:Date.now()};
    await ref.update(updates);
    showErr('');
    document.getElementById('lob-code').textContent=code;
    showScreen('lobby');
    listen();
  }catch(e){showErr('เกิดข้อผิดพลาด: '+e.message);}
}

// ── LISTEN ──
function listen(){
  if(unsub) unsub();
  unsub=db.collection('rooms').doc(roomId).onSnapshot(snap=>{
    if(!snap.exists) return;
    const data=snap.data();
    const cur=document.querySelector('.screen.active')?.id;
    if(data.status==='lobby'||data.status==='waiting_start'){
      if(cur!=='lobby') showScreen('lobby');
      renderLobby(data);
    } else if(data.status==='playing'){
      // เปิดเกม
      openGame(data);
    } else if(data.status==='confirming'){
      showScreen('waiting');
      renderWaiting(data);
    } else if(data.status==='results'){
      showResults(data);
    }
  });
}

// ── RENDER LOBBY ──
function renderLobby(data){
  const players=data.players||{};
  const arr=Object.entries(players);
  document.getElementById('lob-count').textContent=arr.length+' คน';
  document.getElementById('lob-players').innerHTML=arr.map(([id,p])=>`
    <div class="player-item">
      <div class="player-avatar">${p.avatar}</div>
      <div class="player-name">${p.name}${id===myId?' (คุณ)':''}</div>
      <div class="player-status ${p.isHost?'s-host':'s-wait'}">${p.isHost?'🎯 Host':'⏳ รอ'}</div>
    </div>`).join('');
  const btn=document.getElementById('btn-start');
  if(isHost){
    btn.style.display='block';
    document.getElementById('lob-info').textContent=`กด "เริ่มเกม" เมื่อพร้อม (${arr.length} คน)`;
  } else {
    btn.style.display='none';
    document.getElementById('lob-info').textContent='รอ Host กด "เริ่มเกม"';
  }
}

// ── START GAME ──
async function startGame(){
  if(!isHost) return;
  const snap=await db.collection('rooms').doc(roomId).get();
  const players=snap.data()?.players||{};
  if(Object.keys(players).length<2){alert('ต้องมีผู้เล่นอย่างน้อย 2 คน');return;}
  await db.collection('rooms').doc(roomId).update({status:'playing',startedAt:Date.now(),round:1});
}

// ── OPEN GAME ──
function openGame(data){
  const params=new URLSearchParams({
    room:roomId,
    myId:myId,
    myName:encodeURIComponent(myName),
  });
  window.location.href='game-room.html?'+params.toString();
}

// ── WAITING (after confirm) ──
function renderWaiting(data){
  const players=data.players||{};
  document.getElementById('wait-players').innerHTML=Object.entries(players).map(([id,p])=>`
    <div class="pwait-item">
      <div class="player-avatar">${p.avatar}</div>
      <div class="player-name">${p.name}${id===myId?' (คุณ)':''}</div>
      <div style="font-size:18px">${p.ready?'✅':'⏳'}</div>
    </div>`).join('');
}

// ── UNDO CONFIRM ──
async function undoConfirm(){
  const allDone=await checkAllDone();
  if(allDone){alert('ไม่สามารถจัดใหม่ได้ ทุกคนพร้อมแล้ว');return;}
  const updates={};
  updates[`players.${myId}.ready`]=false;
  updates['status']='playing';
  await db.collection('rooms').doc(roomId).update(updates);
  window.location.href='game-room.html?room='+roomId+'&myId='+myId+'&myName='+encodeURIComponent(myName);
}

async function checkAllDone(){
  const snap=await db.collection('rooms').doc(roomId).get();
  const players=snap.data()?.players||{};
  return Object.values(players).every(p=>p.ready);
}

// ── SHOW RESULTS ──
function showResults(data){
  const scores=data.roundScores||{};
  const players=data.players||{};
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  document.getElementById('res-scores').innerHTML=sorted.map(([id,sc])=>`
    <div class="score-row">
      <div style="font-size:20px">${players[id]?.avatar||'🃏'}</div>
      <div class="score-name">${players[id]?.name||id}${id===myId?' (คุณ)':''}</div>
      <div class="score-pts ${sc>=0?'pos':'neg'}">${sc>=0?'+':''}${sc}</div>
      <div style="font-size:11px;color:var(--muted)">รวม: ${players[id]?.score||0}</div>
    </div>`).join('');
  document.getElementById('res-overlay').classList.add('show');
}

// ── NEXT ROUND ──
async function nextRound(){
  document.getElementById('res-overlay').classList.remove('show');
  if(!isHost) return;
  const snap=await db.collection('rooms').doc(roomId).get();
  const round=(snap.data()?.round||1)+1;
  await db.collection('rooms').doc(roomId).update({status:'playing',round,roundScores:{}});
}

// ── LEAVE ──
async function leaveRoom(){
  if(roomId&&myId){
    try{
      const updates={};
      updates[`players.${myId}`]=firebase.firestore.FieldValue.delete();
      await db.collection('rooms').doc(roomId).update(updates);
    }catch(e){}
  }
  if(unsub) unsub();
  location.reload();
}

// ── AUTO-FILL FROM URL ──
const up=new URLSearchParams(location.search);
const urlRoom=up.get('room');
const urlName=up.get('name');
const urlAvatar=up.get('avatar');

if(urlRoom) document.getElementById('inp-code').value=urlRoom;
if(urlName) document.getElementById('inp-name').value=urlName;

// ถ้ามี room + name ครบ → ซ่อน manual form แล้ว auto-join
if(urlRoom && urlName){
  document.getElementById('manual-fields').style.display='none';
  document.getElementById('join-btn').style.display='none';
  document.getElementById('join-footer').style.display='none';
  document.getElementById('auto-join-box').style.display='block';
  document.getElementById('auto-av').textContent=urlAvatar||'🎴';
  document.getElementById('auto-name').textContent=urlName;
  // auto-join หลัง Firebase โหลด
  setTimeout(()=>joinRoom(), 800);
} else if(urlRoom){
  // มี room แต่ไม่มีชื่อ → ซ่อน room code field
  document.getElementById('inp-code').closest('.field').style.display='none';
  setTimeout(()=>document.getElementById('inp-name').focus(),300);
}
</script>
</body>
</html>
