<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ไพ่ 13 ใบ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Kanit',sans-serif;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#3d1f7a,#1a1035 60%);color:#f0eaff;display:flex;align-items:center;justify-content:center;}
body{padding:24px;}
.wrap{max-width:340px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px;}
.logo{font-size:56px;font-weight:900;background:linear-gradient(180deg,#fff,#f7d84a 50%,#e0a820);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(247,216,74,.5));}
.sub{font-size:14px;color:#9580c8;letter-spacing:1px;}
.card-fan{position:relative;height:80px;width:260px;}
.fc{position:absolute;width:52px;height:72px;background:linear-gradient(160deg,#fff 60%,#f4f0ff);border-radius:8px;border:1px solid rgba(180,140,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,.6);}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:16px;font-family:'Kanit',sans-serif;font-size:18px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .12s;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 60%);pointer-events:none;}
.btn:active{transform:scale(.96) translateY(2px);}
.btn-gold{background:linear-gradient(160deg,#ffe066,#f7a800,#d47800);color:#2a1000;box-shadow:0 4px 0 #9a5000,0 8px 24px rgba(247,168,0,.4);border-bottom:3px solid #9a5000;}
.btn-purple{background:linear-gradient(160deg,#c080ff,#8030e0,#5010b0);color:#fff;box-shadow:0 4px 0 #30087a,0 8px 24px rgba(128,48,224,.4);border-bottom:3px solid #30087a;}
.divider{width:100%;height:1px;background:rgba(255,255,255,.08);}
.note{font-size:12px;color:#6a5090;line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="logo">🀄 ไพ่ 13 ใบ</div>
    <div class="sub">Chinese Poker • สไตล์ไทย</div>
  </div>

  <div class="card-fan">
    <div class="fc" style="transform:rotate(-22deg) translateX(-80px);color:#c82020">A♥</div>
    <div class="fc" style="transform:rotate(-11deg) translateX(-40px);color:#1a1a2e">K♠</div>
    <div class="fc" style="transform:rotate(0deg);color:#c82020">Q♦</div>
    <div class="fc" style="transform:rotate(11deg) translateX(40px);color:#1a1a2e">J♣</div>
    <div class="fc" style="transform:rotate(22deg) translateX(80px);color:#c82020">10♥</div>
  </div>

  <a class="btn btn-gold" href="poker-player.html">🎮 เข้าเล่นเกม</a>
  <a class="btn btn-purple" href="thai-poker13.html">🃏 โหมดฝึกซ้อม (Solo)</a>

  <div class="divider"></div>

  <div class="note">
    🔐 สำหรับ Admin เท่านั้น<br>
    <a href="poker-admin.html" style="color:#a080ff;text-decoration:none;font-weight:700">→ เข้าหน้า Admin</a>
  </div>
</div>
</body>
</html>
