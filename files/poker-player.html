<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ไพ่ 13 ใบ — เข้าเล่น</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&display=swap');
:root{
  --bg:#1a1035;--panel:rgba(40,15,90,.7);
  --gold:#f7d84a;--teal:#00d4aa;--red:#ff5566;--green:#3de88a;
  --muted:#9580c8;--text:#f0eaff;--border:rgba(255,255,255,.1);
  --chip5:#f0f0f0;--chip10:#e83030;--chip20:#2060e0;
  --chip50:#10a040;--chip100:#222;--chip500:#9020c0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body{background:radial-gradient(ellipse at 50% 0%,#3d1f7a,#1a1035 60%),url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4z'/%3E%3C/g%3E%3C/svg%3E");}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.screen.active{display:flex;}

/* ── SELECT ROOM ── */
#screen-room{gap:20px;}
.logo{font-size:42px;font-weight:900;background:linear-gradient(180deg,#fff,#f7d84a 50%,#e0a820);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 14px rgba(247,216,74,.4));text-align:center;}
.logo-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:2px;letter-spacing:1px;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;align-self:flex-start;width:100%;max-width:340px;}
.room-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.room-btn{
  background:rgba(80,20,160,.3);border:1px solid rgba(140,80,255,.25);
  border-radius:16px;padding:16px 18px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .15s;touch-action:manipulation;
}
.room-btn:hover,.room-btn:active{background:rgba(140,80,255,.2);border-color:rgba(140,80,255,.5);transform:scale(.98);}
.room-name{font-size:16px;font-weight:700;}
.room-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.room-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.rb-open{background:rgba(61,232,138,.15);color:var(--green);}
.rb-playing{background:rgba(247,216,74,.15);color:var(--gold);}
.no-room{text-align:center;color:var(--muted);font-size:14px;padding:24px;}

/* ── SELECT PLAYER ── */
#screen-player{gap:16px;}
.back-btn{align-self:flex-start;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;touch-action:manipulation;}
.room-title-bar{text-align:center;font-size:20px;font-weight:700;color:var(--gold);}
.player-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:380px;}
.player-card{
  background:rgba(80,20,160,.25);border:1px solid rgba(140,80,255,.2);
  border-radius:14px;padding:14px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all .15s;touch-action:manipulation;
  position:relative;
}
.player-card:active{transform:scale(.95);}
.player-card.selected{border-color:var(--teal);background:rgba(0,212,170,.12);box-shadow:0 0 0 2px rgba(0,212,170,.25);}
.player-av{font-size:30px;line-height:1;}
.player-name{font-size:14px;font-weight:700;text-align:center;}
.player-chips{font-size:12px;color:var(--muted);text-align:center;}
.player-status-dot{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green);}

/* ── PIN ENTRY ── */
#screen-pin{gap:20px;max-width:320px;margin:0 auto;}
.pin-info{text-align:center;}
.pin-avatar{font-size:52px;margin-bottom:4px;}
.pin-name{font-size:22px;font-weight:700;color:var(--gold);}
.pin-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.pin-display{
  display:flex;gap:12px;justify-content:center;align-items:center;
  margin:8px 0;
}
.pin-dot{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(140,80,255,.5);
  background:transparent;
  transition:background .15s,border-color .15s;
}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.pin-input{
  width:100%;background:rgba(80,20,160,.3);
  border:1px solid rgba(140,80,255,.3);border-radius:12px;
  padding:14px;color:var(--text);font-family:'Kanit',sans-serif;
  font-size:20px;text-align:center;letter-spacing:8px;outline:none;
}
.pin-input:focus{border-color:var(--teal);}
.pin-err{color:var(--red);font-size:13px;text-align:center;min-height:20px;}
.pin-hint{font-size:11px;color:var(--muted);text-align:center;}

/* ── MEMBER DASHBOARD ── */
#screen-dashboard{gap:0;justify-content:flex-start;padding:0;}
.dash-header{
  width:100%;background:rgba(10,5,30,.7);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(140,80,255,.2);
  backdrop-filter:blur(8px);
}
.dash-avatar-name{display:flex;align-items:center;gap:10px;}
.dash-av{font-size:28px;}
.dash-name{font-size:16px;font-weight:700;}
.dash-sub{font-size:11px;color:var(--muted);}
.logout-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}

.dash-body{flex:1;overflow-y:auto;padding:16px;width:100%;max-width:480px;margin:0 auto;}

/* CHIP WALLET */
.wallet-card{
  background:rgba(80,20,160,.3);border:1px solid rgba(140,80,255,.25);
  border-radius:18px;padding:18px;margin-bottom:16px;
}
.wallet-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:14px;}
.wallet-total{font-size:38px;font-weight:900;color:var(--gold);text-shadow:0 0 16px rgba(247,216,74,.35);margin-bottom:4px;text-align:center;}
.wallet-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px;}
.chip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.chip-tile{
  background:rgba(255,255,255,.05);border-radius:12px;
  padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;
  border:1px solid rgba(255,255,255,.08);
}
.chip-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;
  box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);
  border:3px dashed rgba(255,255,255,.3);
  flex-shrink:0;
}
.chip-count{font-size:20px;font-weight:700;line-height:1;}
.chip-val{font-size:10px;color:var(--muted);}

/* ROOM INFO */
.room-info-card{background:rgba(80,20,160,.3);border:1px solid rgba(140,80,255,.25);border-radius:18px;padding:16px;margin-bottom:16px;}
.room-info-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
.room-info-name{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.room-players-list{display:flex;flex-direction:column;gap:6px;}
.rp-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border-radius:10px;padding:8px 12px;}
.rp-left{display:flex;align-items:center;gap:8px;}
.rp-name{font-size:13px;font-weight:600;}
.rp-chips{font-size:12px;font-weight:700;color:var(--gold);}
.rp-self{border:1px solid rgba(0,212,170,.3);}

/* play button */
.play-btn{
  width:100%;background:linear-gradient(160deg,#ffe066,#f7a800,#d47800);
  color:#2a1000;border:none;border-radius:16px;
  padding:16px;font-family:'Kanit',sans-serif;font-size:18px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 0 #9a5000,0 6px 20px rgba(247,168,0,.4);
  border-bottom:3px solid #9a5000;touch-action:manipulation;
  transition:all .12s;margin-bottom:12px;
}
.play-btn:active{transform:scale(.97) translateY(2px);}

/* BUTTONS */
.btn{padding:12px 24px;border:none;border-radius:12px;font-family:'Kanit',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .12s;touch-action:manipulation;width:100%;max-width:340px;}
.btn:active{transform:scale(.96);}
.btn-teal{background:linear-gradient(160deg,#5affa0,#18c860,#0e8040);color:#002a15;box-shadow:0 4px 0 #085028;}
.btn-gold{background:linear-gradient(160deg,#ffe066,#f7a800,#d47800);color:#2a1000;box-shadow:0 4px 0 #9a5000;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(30,15,70,.95);border:1px solid var(--teal);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--teal);box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(min-width:500px){.player-grid{grid-template-columns:repeat(3,1fr);}.chip-grid{grid-template-columns:repeat(6,1fr);}}
</style>
</head>
<body>

<!-- SCREEN: เลือกห้อง -->
<div class="screen active" id="screen-room">
  <div class="logo">🀄 ไพ่ 13 ใบ</div>
  <div class="logo-sub">เลือกห้องเพื่อเข้าเล่น</div>
  <div class="section-title">ห้องที่เปิดอยู่</div>
  <div class="room-list" id="room-list"></div>
  <div style="margin-top:8px;font-size:12px;color:var(--muted)">🔄 <a href="#" onclick="loadRooms()" style="color:var(--teal);text-decoration:none">รีเฟรช</a></div>
</div>

<!-- SCREEN: เลือกชื่อ -->
<div class="screen" id="screen-player">
  <button class="back-btn" onclick="goBack('screen-room')">← กลับ</button>
  <div class="room-title-bar" id="player-room-title">🏠 เลือกชื่อของคุณ</div>
  <div style="font-size:13px;color:var(--muted);text-align:center">แตะชื่อของคุณ</div>
  <div class="player-grid" id="player-grid"></div>
</div>

<!-- SCREEN: ใส่รหัสผ่าน -->
<div class="screen" id="screen-pin">
  <button class="back-btn" onclick="goBack('screen-player')">← กลับ</button>
  <div class="pin-info">
    <div class="pin-avatar" id="pin-avatar">🦊</div>
    <div class="pin-name" id="pin-name">ชื่อ</div>
    <div class="pin-sub">ใส่รหัสผ่านของคุณ</div>
  </div>
  <div style="width:100%;max-width:300px">
    <input class="pin-input" id="pin-input" type="password" placeholder="รหัสผ่าน" oninput="clearPinErr()" onkeydown="if(event.key==='Enter')tryLogin()">
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-hint">* ถ้าลืมรหัสผ่าน ติดต่อ Admin</div>
  </div>
  <button class="btn btn-teal" onclick="tryLogin()">เข้าเล่น →</button>
</div>

<!-- SCREEN: Dashboard ผู้เล่น -->
<div class="screen" id="screen-dashboard">
  <div class="dash-header">
    <div class="dash-avatar-name">
      <div class="dash-av" id="dash-av">🦊</div>
      <div>
        <div class="dash-name" id="dash-name">ชื่อ</div>
        <div class="dash-sub" id="dash-sub">VIP • ไพ่ 13 ใบ</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">ออก</button>
  </div>
  <div class="dash-body">
    <!-- WALLET -->
    <div class="wallet-card">
      <div class="wallet-title">💰 กระเป๋าชิป</div>
      <div class="wallet-total" id="dash-total">0</div>
      <div class="wallet-label">มูลค่ารวม (pts)</div>
      <div class="chip-grid" id="dash-chips"></div>
    </div>
    <!-- ROOM INFO -->
    <div class="room-info-card" id="dash-room-card">
      <div class="room-info-title">🏠 ห้องของคุณ</div>
      <div class="room-info-name" id="dash-room-name">—</div>
      <div class="room-players-list" id="dash-room-players"></div>
    </div>
    <!-- PLAY BTN -->
    <button class="play-btn" onclick="goPlay()">🎮 เข้าเกม</button>
    <div style="text-align:center;font-size:12px;color:var(--muted)">เข้าเกมได้เมื่อ Admin เปิดโต๊ะ</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DENOMS=[5,10,20,50,100,500];
const CCOLOR={5:'#f0f0f0',10:'#e83030',20:'#2060e0',50:'#10a040',100:'#222',500:'#9020c0'};
const CEMOJI={5:'⚪',10:'🔴',20:'🔵',50:'🟢',100:'⚫',500:'🟣'};
function wTotal(w){return DENOMS.reduce((s,d)=>s+d*(w[d]||0),0);}

let shared={members:[],rooms:[]};
let currentRoom=null,currentMember=null;

function loadShared(){
  try{const d=localStorage.getItem('p13shared');if(d)shared=JSON.parse(d);}catch(e){}
}
function loadRooms(){
  loadShared();
  const list=document.getElementById('room-list');
  const openRooms=shared.rooms.filter(r=>r.status!=='closed');
  if(!openRooms.length){
    list.innerHTML=`<div class="no-room">ยังไม่มีห้องที่เปิด<br><small>รอ Admin เปิดห้องก่อนนะ</small></div>`;
    return;
  }
  list.innerHTML=openRooms.map(r=>{
    const cls=r.status==='playing'?'rb-playing':'rb-open';
    const lbl=r.status==='playing'?'กำลังเล่น':'เปิด';
    return`<div class="room-btn" onclick="selectRoom('${r.id}')">
      <div>
        <div class="room-name">🏠 ${r.name}</div>
        <div class="room-meta">${r.players.length} ผู้เล่น</div>
      </div>
      <span class="room-badge ${cls}">${lbl}</span>
    </div>`;
  }).join('');
}

function selectRoom(rid){
  loadShared();
  currentRoom=shared.rooms.find(r=>r.id===rid);
  if(!currentRoom)return;
  document.getElementById('player-room-title').textContent='🏠 '+currentRoom.name;
  const grid=document.getElementById('player-grid');
  const players=currentRoom.players.map(pid=>shared.members.find(m=>m.id===pid)).filter(Boolean);
  grid.innerHTML=players.map(m=>`
    <div class="player-card" onclick="selectPlayer('${m.id}')">
      <div class="player-status-dot" style="background:${m.status==='vip'?'var(--gold)':'var(--green)'}"></div>
      <div class="player-av">${m.avatar}</div>
      <div class="player-name" style="color:${m.color}">${m.name}</div>
      <div class="player-chips">${wTotal(m.wallet).toLocaleString()} pts</div>
    </div>`).join('');
  showScreen('screen-player');
}

function selectPlayer(mid){
  loadShared();
  currentMember=shared.members.find(m=>m.id===mid);
  if(!currentMember)return;
  document.getElementById('pin-avatar').textContent=currentMember.avatar;
  document.getElementById('pin-name').textContent=currentMember.name;
  document.getElementById('pin-name').style.color=currentMember.color;
  document.getElementById('pin-input').value='';
  document.getElementById('pin-err').textContent='';
  showScreen('screen-pin');
  setTimeout(()=>document.getElementById('pin-input').focus(),300);
}

function tryLogin(){
  const input=document.getElementById('pin-input').value;
  // read password from admin DB
  let adminDB;
  try{adminDB=JSON.parse(localStorage.getItem('p13admin')||'{}');}catch(e){adminDB={};}
  const adminMember=(adminDB.members||[]).find(m=>m.id===currentMember.id);
  const correctPw=adminMember?.pw||'1234';
  if(input===correctPw){
    renderDashboard();
    showScreen('screen-dashboard');
  } else {
    document.getElementById('pin-err').textContent='❌ รหัสผ่านไม่ถูกต้อง';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-input').style.borderColor='var(--red)';
    setTimeout(()=>{document.getElementById('pin-input').style.borderColor='';},1000);
  }
}
function clearPinErr(){document.getElementById('pin-err').textContent='';}

function renderDashboard(){
  loadShared();
  const m=shared.members.find(x=>x.id===currentMember.id)||currentMember;
  document.getElementById('dash-av').textContent=m.avatar;
  document.getElementById('dash-name').textContent=m.name;
  document.getElementById('dash-name').style.color=m.color;
  document.getElementById('dash-sub').textContent={active:'สมาชิก',vip:'VIP ⭐',inactive:'ถูกระงับ'}[m.status]||'สมาชิก';
  document.getElementById('dash-total').textContent=wTotal(m.wallet).toLocaleString();
  document.getElementById('dash-chips').innerHTML=DENOMS.map(d=>`
    <div class="chip-tile">
      <div class="chip-circle" style="background:${CCOLOR[d]};color:${d===5?'#222':'#fff'}">${d}</div>
      <div class="chip-count">${m.wallet[d]||0}</div>
      <div class="chip-val">${CEMOJI[d]}</div>
    </div>`).join('');
  // room info
  if(currentRoom){
    document.getElementById('dash-room-name').textContent=currentRoom.name;
    const pl=(currentRoom.players||[]).map(pid=>shared.members.find(x=>x.id===pid)).filter(Boolean);
    document.getElementById('dash-room-players').innerHTML=pl.map(p=>`
      <div class="rp-row ${p.id===m.id?'rp-self':''}">
        <div class="rp-left">
          <span style="font-size:18px">${p.avatar}</span>
          <span class="rp-name" style="color:${p.color}">${p.name}${p.id===m.id?' (คุณ)':''}</span>
        </div>
        <span class="rp-chips">${wTotal(p.wallet).toLocaleString()}</span>
      </div>`).join('');
  }
}

function goPlay(){
  toast('🎮 เปิดเกมแล้ว! (ระบบเชื่อมต่อเกมกำลังพัฒนา)');
}
function logout(){
  currentMember=null;
  showScreen('screen-room');
  loadRooms();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goBack(to){showScreen(to);if(to==='screen-room')loadRooms();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

/* INIT */
loadRooms();
</script>
</body>
</html>
